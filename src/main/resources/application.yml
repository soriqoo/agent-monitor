spring:
  application:
    name: agent-monitor
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/agent_monitor}"
    username: "${DB_USERNAME:agent_monitor}"
    password: "${DB_PASSWORD:agent_monitor}"
    driver-class-name: "org.postgresql.Driver"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  task:
    scheduling:
      pool:
        size: "${SCHEDULING_POOL_SIZE:3}"

app:
  timezone: "Asia/Seoul"
  monitoring:
    poll-cron: "0 */5 * * * *"
    retention-cron: "0 30 3 * * *"
    retention-days: 30
    timeout-ms: 3000
    connect-timeout-ms: 3000
    observation-failure-open-threshold: 3
  seed:
    enabled: "${APP_SEED_ENABLED:true}"
    monitored-services:
      - service-name: "dmib"
        base-url: "${DMIB_BASE_URL:http://localhost:8080}"
        environment: "${DMIB_ENVIRONMENT:prod}"
        enabled: "${DMIB_ENABLED:true}"
  slack:
    enabled: "${SLACK_ENABLED:false}"
    webhook-url: "${SLACK_WEBHOOK_URL:}"
    incident-reminder-enabled: "${SLACK_INCIDENT_REMINDER_ENABLED:false}"
    incident-reminder-interval-minutes: "${SLACK_INCIDENT_REMINDER_INTERVAL_MINUTES:60}"
    incident-reminder-cron: "${SLACK_INCIDENT_REMINDER_CRON:0 */5 * * * *}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    probes:
      enabled: true

logging:
  level:
    root: INFO
